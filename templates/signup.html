<!DOCTYPE html>
<html>
<head>
    <title>Signup - DARK AI</title>
</head>
<body style="background:black;color:white;text-align:center;padding-top:100px;font-family:Arial;">

    <h1>Create DARK AI Account 🚀</h1>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <br><br>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <br><br>

        <button type="submit">
            Signup
        </button>

    </form>

    <br>

    <a href="/login" style="color:cyan;">
        Already have account?
    </a>

</body>
</html>
